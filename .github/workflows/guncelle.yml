name: Guncel Mansetleri Cek

on:
  schedule:
    - cron: '15 5 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Python Kurulumu ve Cache
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Kütüphaneleri Yükle
        run: pip install -r requirements.txt

      - name: Python Scriptini Çalıştır
        run: python scraper.py

      # ⚡ R2'YE YÜKLEME ADIMI (S3 API ile - Zaten var olan secret'ları kullanır)
      - name: Cloudflare R2'ye Yukle
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 cp mansetler.json s3://gezo-data/mansetler.json --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com --no-progress

      # Yükleme bittikten sonra Github'a da yedeklesin
      - name: Değişiklikleri GitHub'a Yükle
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add mansetler.json

          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Otomatik Güncelleme: Güncel Manşetler"
            git push
          else
            echo "Değişiklik yok, commit atlanıyor."
          fi
name: Guncel Mansetleri Cek

on:
  schedule:
    - cron: '15 5 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Python Kurulumu ve Cache
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Bağımlılıkları önbelleğe alır, her gün sıfırdan indirmez

      - name: Kütüphaneleri Yükle
        # Eğer depoya requirements.txt eklersen bunu pip install -r requirements.txt yapabilirsin
        run: pip install -r requirements.txt

      - name: Python Scriptini Çalıştır
        run: python scraper.py # || exit 1 kaldırıldı, zaten default davranış

      - name: Değişiklikleri GitHub'a Yükle
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add mansetler.json

          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Otomatik Güncelleme: Güncel Manşetler"
            git push
          else
            echo "Değişiklik yok, commit atlanıyor."
          fi

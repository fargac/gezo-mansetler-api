name: Guncel Mansetleri Cek

on:
  schedule:
    # Türkiye saatiyle 08:30 (UTC 05:30)
    - cron: '30 5 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Kütüphaneleri Yükle
        run: pip install requests beautifulsoup4

      - name: Python Scriptini Çalıştır
        run: python scraper.py

      - name: Değişiklikleri GitHub'a Yükle
        id: commit
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add mansetler.json
          if git diff-index --quiet HEAD; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Değişiklik yok, commit atlanıyor."
          else
            git commit -m "Otomatik Güncelleme: Güncel Manşetler"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: jsDelivr Cache Temizle
        if: steps.commit.outputs.changed == 'true'
        run: |
          curl -s "https://purge.jsdelivr.net/gh/fargac/gezo-mansetler-api@main/mansetler.json"
          echo "✅ Manşet CDN Önbelleği temizlendi!"

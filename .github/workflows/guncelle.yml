name: Guncel Mansetleri Cek

on:
  schedule:
    # Türkiye saatiyle (UTC+3) sabah 07:15, 08:15 ve 09:15'te çalışır.
    - cron: '15 4,5,6 * * *'
  workflow_dispatch: # İstersen GitHub arayüzünden manuel tetiklemek için

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    # Commit atabilmesi için gerekli izin
    permissions:
      contents: write

    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v3

      - name: Python Kurulumu
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Kütüphaneleri Yükle
        run: |
          pip install requests beautifulsoup4

      - name: Python Scriptini Çalıştır
        run: python scraper.py

      - name: Değişiklikleri GitHub'a Yükle
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add mansetler.json
          git commit -m "Otomatik Güncelleme: Güncel Manşetler" || echo "Değişiklik yok"
          git push
